name: Update README with Merged PRs

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 0 * * *' # Still runs daily at midnight to catch PRs merged by other people
  workflow_dispatch: # Still lets you click the manual button if you want

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch Data and Update README
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python update_readme.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: dynamically update merged PRs in README" && git push)